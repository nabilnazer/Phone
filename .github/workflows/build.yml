name: Build APK

on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      # Decode the persistent debug keystore from a repository secret so every
      # build is signed with the same key. If the secret is not set the step is
      # a no-op and Gradle falls back to a fresh per-runner default keystore
      # (don't install those builds — they won't be update-compatible).
      - name: Decode debug keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.DEBUG_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > debug.keystore
            echo "Persistent debug keystore restored from secret."
          else
            echo "::warning::DEBUG_KEYSTORE_BASE64 secret not set — using a default per-runner keystore. APK will not be update-compatible with other builds."
          fi

      - name: Build core debug APK
        run: ./gradlew assembleCoreDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: phone-core-debug-apk
          path: app/build/outputs/apk/core/debug/*.apk
          if-no-files-found: error
          retention-days: 30
