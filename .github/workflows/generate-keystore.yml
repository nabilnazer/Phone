name: Generate debug keystore (one-time)

# Run this manually once. It creates a fresh debug keystore on a clean Ubuntu
# runner, base64-encodes it, and uploads the encoded text as a workflow artifact
# you can download. Copy the contents of the .txt file into a repository secret
# named DEBUG_KEYSTORE_BASE64. After that, the regular Build APK workflow signs
# every build with that same key, so installs across builds can update each
# other on your phone instead of being treated as different apps.

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Phone Debug Build,O=Personal,C=US"

          base64 -w 0 debug.keystore > debug-keystore.base64.txt

          echo "Keystore SHA-256 fingerprint:"
          keytool -list -v -keystore debug.keystore -storepass android | grep -E "SHA1|SHA256" || true

      - name: Upload keystore base64 as artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-keystore-base64
          path: debug-keystore.base64.txt
          retention-days: 7
